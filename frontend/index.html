<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Pilot | 你的智能营养助手</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        :root {
            --buttermilk: #FFFDF5;
            --almond: #F7F3E9;
            --coral: #FF8A65;
            --sage: #81C784;
            --charcoal: #4A453E;
            --font-title: "Songti SC", "STSong", "Source Han Serif SC", "Noto Serif SC", serif;
            --font-body: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--buttermilk);
            color: var(--charcoal);
            letter-spacing: 0.01em;
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .font-serif-brand {
            font-family: var(--font-title);
            font-style: normal;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }

        button,
        input,
        textarea,
        select {
            font-family: var(--font-body);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(74, 69, 62, 0.04);
            border-radius: 999px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(74, 69, 62, 0.2);
            border-radius: 999px;
            border: 2px solid rgba(255, 253, 245, 0.9);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(74, 69, 62, 0.32);
        }

        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: rgba(74, 69, 62, 0.28) rgba(74, 69, 62, 0.05);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-title);
            letter-spacing: 0.01em;
            line-height: 1.3;
        }

        .font-nums {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
        }
    </style>

</html>
